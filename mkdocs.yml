# Site Information
site_name: My Docs

# Repo Information
repo_name: kgreen1200/example-project
repo_url: https://github.com/kgreen1200/example-project
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright © 2024 Kevin Green

# Configuration
theme:
  name: material
  icon:
    logo: material/file-document-edit-outline
    repo: simple/github
    edit: material/pencil
    view: material/eye
  language: en
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch To Light Mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      accent: deep orange
      primary: brown
      toggle:
        icon: material/toggle-switch
        name: Switch To Dark Mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: deep orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch To Match System Preference
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.share
    - search.highlight
    - content.action.edit
    - content.action.view
plugins:
  - privacy
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: iso_date
  - git-committers:
      repository: kgreen1200/example-project
      branch: main
extra:
  social:
    - icon: simple/github
      link: https://github.com/kgreen1200
      name: kgreen1200 on GitHub